name: Sync writing from blog

on:
  schedule:
    - cron: "0 15 * * *"   # daily, 10am Chicago
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch feeds and rebuild writing.json
        run: python3 scripts/sync_writing.py
      - name: Commit if changed
        run: |
          git config user.name "writing-sync-bot"
          git config user.email "actions@github.com"
          git add assets/writing.json posts/
          git diff --cached --quiet || (git commit -m "Sync writing from blog" && git push)
